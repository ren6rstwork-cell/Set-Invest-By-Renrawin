version: '3.8'

services:
  # 1. ตู้ฐานข้อมูล MySQL
  db:
    image: mysql:8.0
    container_name: php-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: invest_db
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  # 2. ตู้หน้าเว็บ + หลังบ้าน PHP
  web:
    image: php:8.1-apache
    container_name: php-web-app
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/html/site
    working_dir: /var/html/site
    depends_on:
      - db
    entrypoint: >
      bash -c "
      docker-php-ext-install mysqli pdo pdo_mysql &&
      sed -i 's|/var/www/html|/var/html/site|g' /etc/apache2/sites-available/000-default.conf &&
      apache2-foreground
      "
